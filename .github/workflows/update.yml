name: Update GameZone Data

on:
  schedule:
    # 매일 한국시간 오전 6시, 오후 12시, 오후 6시 (UTC 기준)
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python scripts/update.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add top20.json top100.json epic.json meta.json
          git diff --cached --quiet || git commit -m "🎮 데이터 갱신: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
